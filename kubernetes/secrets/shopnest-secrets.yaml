apiVersion: v1
kind: Secret
metadata:
  name: shopnest-secrets
  namespace: shopnest
type: Opaque
# Values below are base64-encoded. Use: echo -n 'value' | base64
# IMPORTANT: Replace all values before deploying to production!
stringData:
  JWT_SECRET: "shopnest-production-jwt-secret-change-this-immediately"
  POSTGRES_PASSWORD: "shopnest_strong_password_change_this"
  STRIPE_SECRET_KEY: "sk_live_your_stripe_key_here"
  STRIPE_WEBHOOK_SECRET: "whsec_your_webhook_secret_here"
  SMTP_USER: "noreply@shopnest.in"
  SMTP_PASS: "your_smtp_app_password_here"
  MONGO_ROOT_PASSWORD: "mongo_root_password_change_this"
---
apiVersion: v1
kind: Secret
metadata:
  name: shopnest-registry-secret
  namespace: shopnest
type: kubernetes.io/dockerconfigjson
data:
  # Replace with your actual ECR credentials
  # Use: kubectl create secret docker-registry shopnest-registry-secret \
  #   --docker-server=<ECR_REGISTRY> \
  #   --docker-username=AWS \
  #   --docker-password=$(aws ecr get-login-password --region us-east-1) \
  #   --namespace=shopnest
  .dockerconfigjson: e30K